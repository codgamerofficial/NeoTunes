[build]
  base = "neotunes"
  command = "npm run build:web"
  publish = "dist"

[build.environment]
  EXPO_PUBLIC_API_URL = "/api"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
